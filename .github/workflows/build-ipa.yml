name: Build IPA

on:
  push:
    tags:
      - 'v*'

env:
  SCHEME: A3ToA4Splitter
  CONFIGURATION: Release
  SDK: iphoneos

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install ldid
        run: |
          if ! command -v ldid &> /dev/null; then
            brew install ldid
          fi
          echo "ldid installed at: $(which ldid)"

      - name: Archive Project
        run: |
          xcodebuild archive \
            -project A3ToA4Splitter.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -archivePath build/${{ env.SCHEME }}.xcarchive \
            -sdk ${{ env.SDK }} \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
            SKIP_INSTALL=NO

      - name: Locate App
        run: |
          echo "====== Locating .app bundle ======"
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Searching in archive..."
            APP_PATH=$(find build/A3ToA4Splitter.xcarchive/Products -name "*.app" -type d | head -n 1)
            echo "APP_PATH=$APP_PATH"
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app bundle not found in archive"
            find build -type d
            exit 1
          fi

          BINARY_NAME=$(basename "$APP_PATH" .app)
          echo "Binary name: $BINARY_NAME"
          
          # 检查 Frameworks 目录是否存在 Swift 库
          echo "====== Checking Frameworks ======"
          FRAMEWORKS_DIR="$APP_PATH/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            echo "Frameworks directory exists:"
            ls -la "$FRAMEWORKS_DIR"
          else
            echo "Frameworks directory does NOT exist!"
          fi

          # 先去掉 xcodebuild 自动加的 ad-hoc 签名
          echo "====== Removing existing code signature ======"
          codesign --remove-signature "$APP_PATH/$BINARY_NAME" 2>/dev/null || echo "No existing signature"
          
          # 移除所有动态库的签名
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -f "$framework/$(basename "$framework" .framework)" ]; then
                codesign --remove-signature "$framework/$(basename "$framework" .framework)" 2>/dev/null || echo "No signature for $framework"
              fi
            done
          fi

          # ldid 伪签名（TrollStore 必需）
          echo "====== ldid signing ======"
          ENTITLEMENTS="A3ToA4Splitter/A3ToA4Splitter.entitlements"
          if [ -f "$ENTITLEMENTS" ]; then
            ldid -S"$ENTITLEMENTS" "$APP_PATH/$BINARY_NAME"
            echo "Signed with entitlements: $ENTITLEMENTS"
          else
            ldid -S "$APP_PATH/$BINARY_NAME"
            echo "Signed without entitlements"
          fi
          
          # ldid 签名所有动态库
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              FRAMEWORK_BINARY="$framework/$(basename "$framework" .framework)"
              if [ -f "$FRAMEWORK_BINARY" ]; then
                ldid -S "$FRAMEWORK_BINARY"
                echo "Signed $FRAMEWORK_BINARY"
              fi
            done
          fi
          
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true
          
          # 检查架构
          echo "====== Checking architecture ======"
          lipo -info "$APP_PATH/$BINARY_NAME"
          file "$APP_PATH/$BINARY_NAME"
          
          # 确保可执行权限
          chmod +x "$APP_PATH/$BINARY_NAME"
          ls -la "$APP_PATH/$BINARY_NAME"
          
          echo "====== App bundle contents ======"
          ls -la "$APP_PATH"
          echo "====== Info.plist CFBundleExecutable ======"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" || true

          echo "====== Save APP_PATH to file for packaging ======"
          echo "$APP_PATH" > build/app_path.txt

      - name: Package IPA
        run: |
          APP_PATH=$(cat build/app_path.txt)
          echo "Packaging $APP_PATH"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          echo "====== Payload contents ======"
          ls -la Payload/
          
          zip -r A3ToA4Splitter.ipa Payload
          rm -rf Payload
          ls -lh A3ToA4Splitter.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: A3ToA4Splitter-IPA
          path: A3ToA4Splitter.ipa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: A3ToA4Splitter.ipa
          name: Release ${{ github.ref_name }}
          body: |
            自动构建的 IPA 文件，适用于 TrollStore 安装。
            - 版本：${{ github.ref_name }}
            - 构建时间：${{ github.event.head_commit.timestamp }}
            - 构建方式：xcodebuild archive 确保 Swift 运行库嵌入
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
