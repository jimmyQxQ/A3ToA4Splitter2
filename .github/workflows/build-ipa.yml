name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show Xcode info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcode-select -p

      - name: Build unsigned archive
        run: |
          mkdir -p build
          echo "====== 开始归档 A3ToA4Splitter ======"

          xcodebuild \
            -project A3ToA4Splitter.xcodeproj \
            -scheme A3ToA4Splitter \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/A3ToA4Splitter.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean archive \
            2>&1 | tee build/build.log

          echo "====== 归档完成 ======"

      - name: Verify archive
        run: |
          ARCHIVE_APP="build/A3ToA4Splitter.xcarchive/Products/Applications/A3ToA4Splitter.app"
          if [ ! -d "$ARCHIVE_APP" ]; then
            echo "错误: xcarchive 中未找到 .app"
            find build -name "*.app" -type d
            exit 1
          fi
          echo "找到归档 app: $ARCHIVE_APP"
          echo "=== .app 内容 ==="
          ls -la "$ARCHIVE_APP"
          echo ""
          echo "=== 查找可执行文件 ==="
          find "$ARCHIVE_APP" -maxdepth 1 -type f

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R "build/A3ToA4Splitter.xcarchive/Products/Applications/A3ToA4Splitter.app" build/Payload/
          cd build
          zip -r A3ToA4Splitter.ipa Payload
          cd ..
          echo "IPA 打包完成"
          ls -lh build/A3ToA4Splitter.ipa

      - name: Verify IPA contents
        run: |
          echo "=== IPA 内容 ==="
          unzip -l build/A3ToA4Splitter.ipa | grep -E "A3ToA4Splitter.app/|Payload"
          echo ""
          echo "=== 验证可执行文件 ==="
          unzip -p build/A3ToA4Splitter.ipa "Payload/A3ToA4Splitter.app/A3ToA4Splitter" > /dev/null && echo "可执行文件存在" || echo "可执行文件不存在!"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: A3ToA4Splitter-unsigned
          path: build/A3ToA4Splitter.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: A3ToA4Splitter-unsigned
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: A3ToA4Splitter.ipa
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
